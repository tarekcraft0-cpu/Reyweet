# بناء IPA على macOS (مجاني) — بدون EAS Cloud builders.
# يشغّل البناء على GitHub Actions (جهاز Mac افتراضي) ويرفع ملف .ipa كـ Artifact.
#
# أضف Secrets في GitHub → Settings → Secrets → Actions:
#   EXPO_TOKEN          — من https://expo.dev/settings/access-tokens
#   EXPO_APPLE_ID       — Apple ID مجاني (إيميل iCloud)
#   EXPO_APPLE_APP_SPECIFIC_PASSWORD — من https://appleid.apple.com (App-Specific Password)
#
# بعد Push: Actions → ios-ipa-sideload → حمّل Artifact: Retweet-ipa

name: ios-ipa-sideload

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Sync API / WebView URLs (public tunnel)
        run: node scripts/sync-mobile-ios.mjs --public

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build IPA locally on macOS runner
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          eas whoami
          eas build --platform ios --profile sideload --local --non-interactive --output ./Retweet.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retweet-ipa
          path: mobile/Retweet.ipa
          if-no-files-found: error
