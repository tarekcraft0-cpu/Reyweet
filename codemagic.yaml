# Codemagic — Retweet iOS (Capacitor) — نفس https://reyweet.vercel.app/app/
# بدون Expo. مخرجات: Retweet-unsigned.ipa للتوقيع اليدوي (شهادة Apple / أدوات صينية)
#
# عرّف في Codemagic → Environment variables (اختياري):
#   RETWEET_PUBLIC_API_URL  — رابط نفق API (مثل https://xxx.trycloudflare.com)
#   CAPACITOR_WEB_APP_URL   — افتراضي https://reyweet.vercel.app/app

workflows:
  retweet-ios-capacitor-ipa:
    name: Retweet iOS — Capacitor IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.reyweet.app
        CAPACITOR_WEB_APP_URL: https://reyweet.vercel.app/app
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace

    scripts:
      - name: تثبيت تبعيات Node (جذر المشروع)
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          npm ci

      - name: تهيئة Capacitor + بناء SPA (نسخة الموقع)
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -n "$RETWEET_PUBLIC_API_URL" ]; then
            echo "$RETWEET_PUBLIC_API_URL" > PUBLIC_API_URL.txt
          fi
          export CAPACITOR_WEB_APP_URL="${CAPACITOR_WEB_APP_URL:-https://reyweet.vercel.app/app}"
          node scripts/prepare-capacitor-ios.mjs

      - name: CocoaPods (Capacitor iOS)
        script: |
          set -e
          IOS_APP="$CM_BUILD_DIR/ios/App"
          if [ ! -d "$IOS_APP" ]; then
            echo "لم يُعثر على ios/App — تحقق من npx cap add ios"
            find "$CM_BUILD_DIR/ios" -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi
          cd "$IOS_APP"
          pod install

      - name: Xcode workspace و scheme (Capacitor App)
        script: |
          set -e
          WS="$CM_BUILD_DIR/$XCODE_WORKSPACE"
          SCHEME="${XCODE_SCHEME:-App}"
          if [ ! -d "$WS" ]; then
            WS=$(find "$CM_BUILD_DIR/ios/App" -maxdepth 1 -name "*.xcworkspace" | head -1)
          fi
          if [ -z "$WS" ] || [ ! -d "$WS" ]; then
            echo "لم يُعثر على App.xcworkspace تحت ios/App"
            find "$CM_BUILD_DIR/ios" -name "*.xcworkspace" 2>/dev/null || true
            exit 1
          fi
          echo "XCODE_WORKSPACE=$WS" >> "$CM_ENV"
          echo "XCODE_SCHEME=$SCHEME" >> "$CM_ENV"
          echo "Using workspace: $WS"
          echo "Using scheme: $SCHEME"
          xcodebuild -workspace "$WS" -list

      - name: بناء iOS بدون توقيع (CODE_SIGNING_ALLOWED=NO)
        script: |
          set -e
          source "$CM_ENV"
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          mkdir -p "$DERIVED"
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: تغليف Payload كملف IPA
        script: |
          set -e
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          APP_PATH=$(find "$DERIVED" -path "*/Build/Products/*-iphoneos/*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "لم يُعثر على .app بعد البناء"
            find "$DERIVED" -name "*.app" 2>/dev/null || true
            exit 1
          fi
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr Retweet-unsigned.ipa Payload
          ls -la "$IPA_DIR"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/DerivedData/**/Build/Products/**/*.app
      - ios-app.config.json
      - /tmp/xcodebuild_logs/*.log

  # الاسم القديم — يوجّه لنفس سير العمل (توافق مع روابط قديمة)
  retweet-ios-unsigned-ipa:
    name: Retweet iOS — Unsigned IPA (Capacitor)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.reyweet.app
        CAPACITOR_WEB_APP_URL: https://reyweet.vercel.app/app
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace
    scripts:
      - name: تثبيت تبعيات Node
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          npm ci
      - name: تهيئة Capacitor
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -n "$RETWEET_PUBLIC_API_URL" ]; then
            echo "$RETWEET_PUBLIC_API_URL" > PUBLIC_API_URL.txt
          fi
          node scripts/prepare-capacitor-ios.mjs
      - name: CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/ios/App"
          pod install
      - name: Xcode workspace و scheme
        script: |
          set -e
          WS="$CM_BUILD_DIR/${XCODE_WORKSPACE:-ios/App/App.xcworkspace}"
          SCHEME="${XCODE_SCHEME:-App}"
          if [ ! -d "$WS" ]; then
            WS=$(find "$CM_BUILD_DIR/ios/App" -maxdepth 1 -name "*.xcworkspace" | head -1)
          fi
          echo "XCODE_WORKSPACE=$WS" >> "$CM_ENV"
          echo "XCODE_SCHEME=$SCHEME" >> "$CM_ENV"
          xcodebuild -workspace "$WS" -list
      - name: بناء بدون توقيع
        script: |
          set -e
          source "$CM_ENV"
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          mkdir -p "$DERIVED"
          xcodebuild -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" -configuration Release -sdk iphoneos -derivedDataPath "$DERIVED" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER="" build
      - name: IPA
        script: |
          set -e
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          APP_PATH=$(find "$DERIVED" -path "*/Build/Products/*-iphoneos/*.app" -type d | head -1)
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr Retweet-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
      - ios-app.config.json
