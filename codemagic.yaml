# Codemagic — Reyweet iOS (Capacitor)
# OTA من الموقع يتطلب IPA موقّعاً → workflow: retweet-ios-ota-signed
# بدون توقيع (للتجربة فقط): retweet-ios-capacitor-ipa

workflows:
  # ─── التثبيت من الموقع (Safari → تثبيت على iPhone) — يحتاج Apple Developer في Codemagic ───
  retweet-ios-ota-signed:
    name: Reyweet iOS — Signed OTA IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.reyweet.app
      vars:
        BUNDLE_ID: com.reyweet.app
        CAPACITOR_WEB_APP_URL: https://reyweet.vercel.app/app
        CAPACITOR_API_URL: https://reyweet.vercel.app
        RETWEET_PUBLIC_API_URL: https://reyweet.vercel.app
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace

    scripts:
      - name: Install Node dependencies
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          npm ci

      - name: Prepare Capacitor + SPA (same as website)
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -n "$RETWEET_PUBLIC_API_URL" ]; then
            echo "$RETWEET_PUBLIC_API_URL" > PUBLIC_API_URL.txt
          fi
          export CAPACITOR_WEB_APP_URL="${CAPACITOR_WEB_APP_URL:-https://reyweet.vercel.app/app}"
          node scripts/prepare-capacitor-ios.mjs

      - name: CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/ios/App"
          pod install

      - name: Code signing setup
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_ADHOC --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Copy IPA for website
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          IPA=$(find "$HOME/build/ios/ipa" "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            IPA=$(find "$CM_BUILD_DIR" -name "*.ipa" | head -1)
          fi
          if [ -z "$IPA" ]; then
            echo "No .ipa found after build-ipa"
            find "$CM_BUILD_DIR" -name "*.ipa" 2>/dev/null || true
            exit 1
          fi
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          cp "$IPA" "$CM_BUILD_DIR/build/ios/ipa/Reyweet-signed.ipa"
          ls -la "$CM_BUILD_DIR/build/ios/ipa/"

    artifacts:
      - build/ios/ipa/*.ipa
      - ios-app.config.json

  retweet-ios-capacitor-ipa:
    name: Retweet iOS — Capacitor IPA (unsigned)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.reyweet.app
        CAPACITOR_WEB_APP_URL: https://reyweet.vercel.app/app
        CAPACITOR_API_URL: https://reyweet.vercel.app
        RETWEET_PUBLIC_API_URL: https://reyweet.vercel.app
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace

    scripts:
      - name: Install Node dependencies
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          npm ci

      - name: Prepare Capacitor + SPA
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -n "$RETWEET_PUBLIC_API_URL" ]; then
            echo "$RETWEET_PUBLIC_API_URL" > PUBLIC_API_URL.txt
          fi
          export CAPACITOR_WEB_APP_URL="${CAPACITOR_WEB_APP_URL:-https://reyweet.vercel.app/app}"
          node scripts/prepare-capacitor-ios.mjs

      - name: CocoaPods
        script: |
          set -e
          IOS_APP="$CM_BUILD_DIR/ios/App"
          if [ ! -d "$IOS_APP" ]; then
            echo "ios/App missing"
            exit 1
          fi
          cd "$IOS_APP"
          pod install

      - name: Xcode workspace
        script: |
          set -e
          WS="$CM_BUILD_DIR/$XCODE_WORKSPACE"
          SCHEME="${XCODE_SCHEME:-App}"
          if [ ! -d "$WS" ]; then
            WS=$(find "$CM_BUILD_DIR/ios/App" -maxdepth 1 -name "*.xcworkspace" | head -1)
          fi
          echo "XCODE_WORKSPACE=$WS" >> "$CM_ENV"
          echo "XCODE_SCHEME=$SCHEME" >> "$CM_ENV"
          xcodebuild -workspace "$WS" -list

      - name: Build unsigned
        script: |
          set -e
          source "$CM_ENV"
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          mkdir -p "$DERIVED"
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package IPA
        script: |
          set -e
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          APP_PATH=$(find "$DERIVED" -path "*/Build/Products/*-iphoneos/*.app" -type d | head -1)
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr Retweet-unsigned.ipa Payload
          ls -la "$IPA_DIR"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/DerivedData/**/Build/Products/**/*.app
      - ios-app.config.json
      - /tmp/xcodebuild_logs/*.log

  retweet-ios-unsigned-ipa:
    name: Retweet iOS — Unsigned IPA (alias)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: v22.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.reyweet.app
        CAPACITOR_WEB_APP_URL: https://reyweet.vercel.app/app
        CAPACITOR_API_URL: https://reyweet.vercel.app
        RETWEET_PUBLIC_API_URL: https://reyweet.vercel.app
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace
    scripts:
      - name: Install Node dependencies
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          npm ci
      - name: Prepare Capacitor
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          if [ -n "$RETWEET_PUBLIC_API_URL" ]; then
            echo "$RETWEET_PUBLIC_API_URL" > PUBLIC_API_URL.txt
          fi
          node scripts/prepare-capacitor-ios.mjs
      - name: CocoaPods
        script: |
          set -e
          cd "$CM_BUILD_DIR/ios/App"
          pod install
      - name: Xcode
        script: |
          set -e
          WS="$CM_BUILD_DIR/${XCODE_WORKSPACE:-ios/App/App.xcworkspace}"
          SCHEME="${XCODE_SCHEME:-App}"
          if [ ! -d "$WS" ]; then
            WS=$(find "$CM_BUILD_DIR/ios/App" -maxdepth 1 -name "*.xcworkspace" | head -1)
          fi
          echo "XCODE_WORKSPACE=$WS" >> "$CM_ENV"
          echo "XCODE_SCHEME=$SCHEME" >> "$CM_ENV"
          xcodebuild -workspace "$WS" -list
      - name: Build unsigned
        script: |
          set -e
          source "$CM_ENV"
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          mkdir -p "$DERIVED"
          xcodebuild -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" -configuration Release -sdk iphoneos -derivedDataPath "$DERIVED" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER="" build
      - name: IPA
        script: |
          set -e
          DERIVED="$CM_BUILD_DIR/build/ios/DerivedData"
          APP_PATH=$(find "$DERIVED" -path "*/Build/Products/*-iphoneos/*.app" -type d | head -1)
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr Retweet-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
      - ios-app.config.json
